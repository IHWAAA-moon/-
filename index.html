        .question-text { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 2rem; line-height: 1.3; }
        .options { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .option { background: rgba(10,7,24,0.7); border: 1px solid rgba(230,180,80,0.5); border-radius: 2rem; padding: 0.9rem 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 1rem; }
        .option:hover { background: rgba(230,180,80,0.2); transform: translateX(8px); border-color: #ffd966; }
        .option.selected { background: rgba(230,180,80,0.35); border-color: #ffcc44; box-shadow: 0 0 8px rgba(255,200,0,0.4); }
        .option-letter { font-weight: 800; font-size: 1.3rem; width: 32px; color: #ffd966; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 1rem; gap: 1rem; }
        .btn { background: linear-gradient(95deg, #2a1e42, #1a112e); border: none; padding: 0.7rem 1.5rem; border-radius: 3rem; color: #ffecb3; font-weight: bold; cursor: pointer; border: 1px solid #e6b42270; transition: 0.2s; }
        .btn-primary { background: linear-gradient(95deg, #c99f2e, #a87b1a); color: #020112; box-shadow: 0 0 8px #ffd966; }
        .btn-primary:hover { transform: scale(1.02); background: #e6b422; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .result-avatar { text-align: center; margin-bottom: 1rem; }
        .character-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid #ffd966; background: #110d1f; box-shadow: 0 0 20px rgba(255,217,0,0.5); }
        .character-name { font-size: 2rem; font-weight: bold; margin: 0.5rem 0; text-shadow: 0 0 6px gold; }
        .武魂-badge { background: #e6b42230; border-radius: 40px; padding: 0.3rem 1rem; display: inline-flex; align-items: center; gap: 8px; margin: 0.5rem auto; }
        .attr-tag { background: #2a1f44; border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.8rem; display: inline-block; margin: 0.2rem; }
        .魂技-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 1rem 0; }
        .魂技-item { background: #1e162f; border-radius: 30px; padding: 0.2rem 1rem; font-size: 0.8rem; border-left: 3px solid #ffd966; }
        .compat-bar { margin-top: 1rem; background: #150e24; border-radius: 30px; height: 10px; overflow: hidden; }
        .compat-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffd966, #ffaa33); transition: width 1s ease; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.6; }
        @keyframes glowPulse { 0% { text-shadow: 0 0 2px #ffd966; } 100% { text-shadow: 0 0 20px #ffaa33; } }

        @media (max-width:550px){ .question-text{ font-size:1.2rem; } .character-img{ width:100px; height:100px; } .hero h1{ font-size:2rem; } }

    // 计算用户维度
    function computeUserDimensions(answers) {
        let sums = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0, B:0, A:0 };
        let cnts = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0, B:0, A:0 };
        for(let i=0; i<answers.length; i++) {
            let opt = answers[i];
            if(opt === undefined || opt === null) continue;
            for(let eff of QUESTIONS[i].eff) {
                let dim = eff.d;
                let val = eff.v[opt];
                if(dim === "E") { sums.E += val; cnts.E++; }
                else if(dim === "B") { sums.B += val; cnts.B++; }
                else if(dim === "J") { sums.J += val; cnts.J++; }
                else if(dim === "F") { sums.F += val; cnts.F++; }
                else if(dim === "N") { sums.N += val; cnts.N++; }
            }
        }
        let avg = (s,c) => c>0 ? s/c : 50;
        let E = avg(sums.E, cnts.E);
        let B = avg(sums.B, cnts.B);
        let J = avg(sums.J, cnts.J);
        let F = avg(sums.F, cnts.F);
        let N = avg(sums.N, cnts.N);
        let I = 100 - E, S = 100 - N, T = 100 - F, P = 100 - J, A = 100 - B;
        return { E, I, S, N, T, F, J, P, B, A };
    }

    // 匹配最佳角色
    function findBestCharacter(user) {
        let best = null, bestScore = -Infinity;
        for(let ch of ROSTER) {
            let d = ch.dim;
            let score = 0;
            score += 20 - Math.abs(user.E - d.E)/5;
            score += 20 - Math.abs(user.S - d.S)/5;
            score += 20 - Math.abs(user.T - d.T)/5;
            score += 20 - Math.abs(user.J - d.J)/5;
            score += 20 - Math.abs(user.B - d.B)/5;
            if(score > bestScore) { bestScore = score; best = ch; }
        }
        return best;
    }

    // 生成备用头像
    function drawFallbackAvatar(character) {
        const canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0,0,200,200);
        grad.addColorStop(0, character.color);
        grad.addColorStop(1, "#1f1735");
        ctx.beginPath(); ctx.arc(100,100,98,0,Math.PI*2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = "#FFD966"; ctx.lineWidth=4;
        ctx.beginPath(); ctx.arc(100,100,95,0,Math.PI*2); ctx.stroke();
        ctx.font = "bold 68px 'Segoe UI'";
        ctx.fillStyle = "#FFF3cf"; ctx.shadowBlur=12;
        let initial = character.name.charAt(0);
        if(character.name === "唐三") initial = "唐";
        else if(character.name === "小舞") initial = "舞";
        else if(character.name === "戴沐白") initial = "戴";
        else if(character.name === "唐舞麟") initial = "麟";
        ctx.fillText(initial, 72, 135);
        ctx.font = "24px 'Segoe UI'";
        ctx.fillStyle = "#FFD58C";
        ctx.fillText("⚜️", 150, 165);
        return canvas.toDataURL();
    }

    // --- UI 状态 ---
    let curIdx = 0;
    let selections = new Array(QUESTIONS.length).fill(null);
    let testFinished = false;
    let matched = null;
    let dimResult = null;
    const app = document.getElementById('app');

    function renderFull() {
        const hero = `<div class="hero"><h1>斗罗大陆人格测试</h1><p><i class="fas fa-dragon"></i> 测测你的武魂真身 · 寻觅史莱克之魂</p></div>`;
        if(testFinished && matched) {
            app.innerHTML = hero + renderResult();
            document.getElementById('restartBtn')?.addEventListener('click', resetTest);
        } else {
            app.innerHTML = hero + renderQuiz();
            bindQuizEvents();
        }
    }

    function renderQuiz() {
        const q = QUESTIONS[curIdx];
        const sel = selections[curIdx];
        return `<div class="quiz-card fade-transition">
            <div class="question-header"><span class="q-num"><i class="fas fa-feather-alt"></i> 第${curIdx+1}/25题</span></div>
            <div class="question-text">${q.text}</div>
            <div class="options" id="optArea">
                ${q.opts.map((opt,i) => `<div class="option ${sel===i ? 'selected' : ''}" data-val="${i}"><span class="option-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></div>`).join('')}
            </div>
            <div class="btn-group">
                <button class="btn" id="prevBtn" ${curIdx===0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i> 上一题</button>
                <button class="btn btn-primary" id="nextBtn">${curIdx===24 ? '揭晓答案' : '下一题'}</button>
            </div>
        </div><footer>✦ 选择你的命运轨迹 ✦</footer>`;
    }

    function bindQuizEvents() {
        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = (e) => {
                let val = parseInt(opt.dataset.val);
                selections[curIdx] = val;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            };
        });
        const prev = document.getElementById('prevBtn');
        const next = document.getElementById('nextBtn');
        if(prev) prev.onclick = () => { if(curIdx>0) { curIdx--; renderFull(); } };
        if(next) next.onclick = () => {
            if(selections[curIdx] === null) {
                next.style.animation = "shake 0.3s";
                setTimeout(()=>next.style.animation="",300);
                return;
            }
            if(curIdx === 24) {
                if(selections.some(v=>v===null)) { alert("请完成全部25道题目，再揭晓答案！"); return; }
                dimResult = computeUserDimensions(selections);
                matched = findBestCharacter(dimResult);
                testFinished = true;
                renderFull();
            } else {
                curIdx++;
                renderFull();
            }
        };
    }

    function renderResult() {
        const skills = matched.skills.split(/[【】]/).filter(s=>s.trim());
        const compat = Math.floor(65 + Math.random() * 28);
        const imgSrc = matched.imgFile;
        const fallbackSrc = drawFallbackAvatar(matched);
        
        return `<div class="result-card fade-transition">
            <div class="result-avatar">
                <img class="character-img" src="${imgSrc}" alt="${matched.name}" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                <div class="character-name">✨ ${matched.name} ✨</div>
                <div class="武魂-badge"><span>${matched.icon}</span> 武魂：${matched.wuhun}</div>
                <div><span class="attr-tag">${matched.type}</span></div>
            </div>
            <div><strong><i class="fas fa-dragon"></i> 魂技：</strong><div class="魂技-grid">${skills.map(s=>`<span class="魂技-item">${s}</span>`).join('')}</div></div>
            <div><strong><i class="fas fa-heart"></i> 性格特点：</strong> ${matched.personality}</div>
            <div><strong><i class="fas fa-handshake"></i> 适配程度：</strong> ${compat}%</div>
            <div class="compat-bar"><div class="compat-fill" style="width:${compat}%"></div></div>
            <div style="margin-top:1.5rem; text-align:center;"><button class="btn btn-primary" id="restartBtn"><i class="fas fa-sync-alt"></i> 重新测试</button></div>
        </div><footer>✦ 斗罗大陆人格测试 · 史莱克七怪与伙伴们的召唤 ✦</footer>`;
    }

    function resetTest() {
        curIdx = 0;
        selections.fill(null);
        testFinished = false;
        matched = null;
        dimResult = null;
        renderFull();
    }

    // 粒子特效
    function initParticles() {
        const canvas = document.getElementById('particleCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];
        const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
        window.addEventListener('resize', resize);
        resize();
        for(let i=0;i<100;i++) particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.2, col:`rgba(255,210,90,${Math.random()*0.5+0.2})` });
        function animate() {
            if(!ctx) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle = p.col; ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if(p.x<0) p.x = canvas.width; if(p.x>canvas.width) p.x=0;
                if(p.y<0) p.y = canvas.height; if(p.y>canvas.height) p.y=0;
            });
            requestAnimationFrame(animate);
        }
        animate();
    }
    initParticles();
    renderFull();
</script>
</body>
</html>
