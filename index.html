    }

    function recalcAllScores(scores, answers) {
        for (let c of CHARACTERS) scores[c.id] = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            const opt = answers[i];
            if (opt !== undefined && opt !== null) updateScores(scores, opt);
        }
    }

    function getTopCharacter(scores) {
        let maxId = null, maxVal = -1;
        for (let c of CHARACTERS) {
            if (scores[c.id] > maxVal) { maxVal = scores[c.id]; maxId = c.id; }
        }
        return CHARACTERS.find(c => c.id === maxId);
    }

    let currentQuestion = 0;
    let userAnswers = new Array(QUESTIONS.length).fill(null);
    let quizScores = {};
    for (let c of CHARACTERS) quizScores[c.id] = 0;
    let quizFinished = false;
    let resultChar = null;
    const appEl = document.getElementById('app');

    function renderApp() {
        const heroSection = `
            <div class="hero">
                <h1>斗罗大陆性格测试</h1>
                <p><i class="fas fa-dragon"></i> 测测你的武魂真身 · 寻觅史莱克之魂</p>
            </div>
        `;
        let content = '';
        if (quizFinished && resultChar) content = renderResultPage();
        else content = renderQuestionPage();
        appEl.innerHTML = heroSection + content;
        if (!quizFinished) attachQuestionEvents();
        else attachResultEvents();
    }

    function renderQuestionPage() {
        const q = QUESTIONS[currentQuestion];
        const selectedIdx = userAnswers[currentQuestion];
        const optionsHtml = q.options.map((opt, idx) => `
            <div class="option ${selectedIdx === idx ? 'selected' : ''}" data-opt-index="${idx}">
                <span class="option-letter">${String.fromCharCode(65+idx)}</span>
                <span>${opt}</span>
            </div>
        `).join('');
        return `
            <div class="quiz-card fade-transition">
                <div class="question-header">
                    <span class="q-num"><i class="fas fa-feather-alt"></i> 第 ${currentQuestion+1} 题</span>
                    <span class="q-total">/${QUESTIONS.length}</span>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">${optionsHtml}</div>
                <div class="btn-group">
                    <button class="btn" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i> 上一题</button>
                    <button class="btn btn-primary" id="nextBtn">${currentQuestion === QUESTIONS.length-1 ? '揭晓答案' : '下一题'}</button>
                </div>
            </div>
            <footer>✦ 选择你的命运轨迹 ✦</footer>
        `;
    }

    function attachQuestionEvents() {
        const options = document.querySelectorAll('.option');
        options.forEach(opt => {
            opt.removeEventListener('click', optionClickHandler);
            opt.addEventListener('click', optionClickHandler);
        });
        function optionClickHandler(e) {
            const optDiv = e.currentTarget;
            const idx = parseInt(optDiv.dataset.optIndex);
            if (userAnswers[currentQuestion] === idx) return;
            userAnswers[currentQuestion] = idx;
            recalcAllScores(quizScores, userAnswers);
            const allOpts = document.querySelectorAll('.option');
            allOpts.forEach(el => {
                if (parseInt(el.dataset.optIndex) === idx) el.classList.add('selected');
                else el.classList.remove('selected');
            });
            optDiv.style.transform = "scale(0.98)";
            setTimeout(() => { if(optDiv) optDiv.style.transform = ""; }, 120);
        }
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        if (prevBtn) {
            prevBtn.removeEventListener('click', prevHandler);
            prevBtn.addEventListener('click', prevHandler);
        }
        function prevHandler() { if (currentQuestion > 0) { currentQuestion--; renderApp(); } }
        if (nextBtn) {
            nextBtn.removeEventListener('click', nextHandler);
            nextBtn.addEventListener('click', nextHandler);
        }
        function nextHandler() {
            if (userAnswers[currentQuestion] === null) {
                nextBtn.style.animation = "shake 0.3s";
                setTimeout(() => nextBtn.style.animation = "", 300);
                return;
            }
            if (currentQuestion === QUESTIONS.length - 1) {
                if (userAnswers.some(ans => ans === null)) { alert("请完成全部题目后再揭晓答案！"); return; }
                recalcAllScores(quizScores, userAnswers);
                resultChar = getTopCharacter(quizScores);
                quizFinished = true;
                renderApp();
            } else { currentQuestion++; renderApp(); }
        }
    }

    function renderResultPage() {
        if (!resultChar) return '<div class="result-card">加载中...</div>';
        const totalScore = Object.values(quizScores).reduce((a,b)=>a+b, 1);
        const maxScore = quizScores[resultChar.id] || 0;
        let compatPercent = Math.min(96, Math.floor(55 + (maxScore / (totalScore / CHARACTERS.length)) * 22));
        compatPercent = Math.max(60, compatPercent);
        const compatDesc = compatPercent > 85 ? "灵魂共鸣，宛如重生！" : (compatPercent > 70 ? "意气相投，武魂契合！" : "潜力伙伴，有待觉醒！");
        const soulSkills = resultChar.魂技.split(/[【】]/).filter(s => s.trim() && s !== ',' && s !== ' ');
        return `
            <div class="result-card fade-transition">
                <div class="result-avatar">
                    <img class="character-img" src="${resultChar.img}" alt="${resultChar.name}" onerror="this.onerror=null; this.src='https://via.placeholder.com/140x140?text=${encodeURIComponent(resultChar.name)}';">
                    <div class="character-name">✨ ${resultChar.name} ✨</div>
                    <div class="武魂-badge"><span class="武魂-icon">${resultChar.武魂图案}</span> 武魂：${resultChar.武魂}</div>
                    <div><span class="attr-tag"><i class="fas fa-crosshairs"></i> ${resultChar.属性}</span></div>
                </div>
                <div><strong><i class="fas fa-dragon"></i> 魂技：</strong></div>
                <div class="魂技-grid">${soulSkills.map(s => `<span class="魂技-item">${s}</span>`).join('')}</div>
                <div><strong><i class="fas fa-heart"></i> 性格特点：</strong> ${resultChar.性格}</div>
                <div style="margin-top: 1rem;"><strong><i class="fas fa-handshake"></i> 适配程度：</strong> ${compatPercent}% ${compatDesc}</div>
                <div class="compat-bar"><div class="compat-fill" style="width: ${compatPercent}%;"></div></div>
                <div style="margin-top:1.8rem; text-align:center;">
                    <button class="btn btn-primary" id="restartTestBtn"><i class="fas fa-sync-alt"></i> 重测武魂真身</button>
                </div>
            </div>
            <footer>✦ 斗罗大陆性格测试 · 史莱克七怪与伙伴们的召唤 ✦</footer>
        `;
    }

    function attachResultEvents() {
        const restartBtn = document.getElementById('restartTestBtn');
        if (restartBtn) {
            restartBtn.removeEventListener('click', restartHandler);
            restartBtn.addEventListener('click', restartHandler);
        }
        function restartHandler() {
            currentQuestion = 0;
            userAnswers = new Array(QUESTIONS.length).fill(null);
            for (let c of CHARACTERS) quizScores[c.id] = 0;
            quizFinished = false;
            resultChar = null;
            renderApp();
        }
    }

    function initParticles() {
        const canvas = document.getElementById('particleCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 110;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2.2 + 0.8, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.25, color: `rgba(255,210,90,${Math.random() * 0.5 + 0.2})` });
        function animate() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(animate);
        }
        animate();
    }
    initParticles();
    renderApp();
</script>
</body>
</html>
